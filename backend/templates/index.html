<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Prediction System — Admin Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>
            <span class="logo-text">ReturnAI</span>
        </div>
        <ul class="sidebar-nav">
            <li class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <span>Predict Returns</span>
            </li>
            <li class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span>Dashboard</span>
            </li>
            <li class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                <span>Reports</span>
            </li>
            <li class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span>Settings</span>
            </li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div class="page-title">
                <h1>Return Prediction System</h1>
                <p class="subtitle">Predict the likelihood of product returns using ML</p>
            </div>
            <div class="top-bar-actions">
                <div class="admin-badge">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Admin
                </div>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="form-card">
                <div class="card-header">
                    <h2>Order Details</h2>
                    <p>Fill in the order information to predict return probability</p>
                </div>
                <form id="predictionForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="product_category">Product Category</label>
                            <select id="product_category" name="product_category" required>
                                <option value="" disabled selected>Select category</option>
                                <option value="Clothing">Clothing</option>
                                <option value="Books">Books</option>
                                <option value="Toys">Toys</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Home">Home</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="product_price">Product Price ($)</label>
                            <input type="number" id="product_price" name="product_price" placeholder="e.g. 299.99" step="0.01" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="order_quantity">Order Quantity</label>
                            <input type="number" id="order_quantity" name="order_quantity" placeholder="e.g. 2" min="1" required>
                        </div>
                        <div class="form-group">
                            <label for="order_date">Order Date</label>
                            <input type="date" id="order_date" name="order_date" required>
                        </div>
                        <div class="form-group">
                            <label for="user_age">User Age</label>
                            <input type="number" id="user_age" name="user_age" placeholder="e.g. 28" min="1" max="120" required>
                        </div>
                        <div class="form-group">
                            <label for="user_gender">User Gender</label>
                            <select id="user_gender" name="user_gender" required>
                                <option value="" disabled selected>Select gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="user_location">User Location</label>
                            <select id="user_location" name="user_location" required>
                                <option value="" disabled selected>Select location</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="payment_method">Payment Method</label>
                            <select id="payment_method" name="payment_method" required>
                                <option value="" disabled selected>Select payment</option>
                                <option value="Credit Card">Credit Card</option>
                                <option value="Debit Card">Debit Card</option>
                                <option value="PayPal">PayPal</option>
                                <option value="Gift Card">Gift Card</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="shipping_method">Shipping Method</label>
                            <select id="shipping_method" name="shipping_method" required>
                                <option value="" disabled selected>Select shipping</option>
                                <option value="Standard">Standard</option>
                                <option value="Express">Express</option>
                                <option value="Next-Day">Next-Day</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="discount_applied">Discount Applied (%)</label>
                            <input type="number" id="discount_applied" name="discount_applied" placeholder="e.g. 15" step="0.01" min="0" max="100" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-predict" id="predictBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        Predict Return Probability
                    </button>
                </form>
            </div>

            <div class="result-card" id="resultCard">
                <div class="card-header">
                    <h2>Prediction Result</h2>
                </div>
                <div class="result-body" id="resultBody">
                    <div class="result-placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <p>Submit the form to see prediction results</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
